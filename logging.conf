[loggers]
keys=root,httpx

[handlers]
keys=consoleHandler

[formatters]
keys=defaultFormatter

[logger_root]
level=INFO
handlers=consoleHandler

[logger_httpx]
level=WARNING
handlers=consoleHandler
qualname=httpx
propagate=0

[handler_consoleHandler]
class=StreamHandler
level=INFO
formatter=defaultFormatter
args=(sys.stderr,)

[formatter_defaultFormatter]
format=%(asctime)s %(levelname)s [%(name)s] %(message)s